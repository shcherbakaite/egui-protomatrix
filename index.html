<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23181818' width='100' height='100' rx='8'/><circle fill='%23b5733c' cx='35' cy='50' r='8'/><circle fill='%23b5733c' cx='65' cy='50' r='8'/><line stroke='%23606060' stroke-width='4' x1='35' y1='50' x2='65' y2='50'/></svg>" type="image/svg+xml">
    <title>Proto Matrix PCB</title>
    <link data-trunk rel="rust" data-wasm-opt="z"/>
    <style>
        html { touch-action: manipulation; }
        body {
            background: #909090;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #404040; }
        }
        html, body { margin: 0 !important; padding: 0 !important; }
        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        .centered {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #f0f0f0;
            font-size: 24px;
            font-family: system-ui, sans-serif;
            text-align: center;
        }
        .lds-dual-ring {
            display: inline-block;
            width: 24px; height: 24px;
        }
        .lds-dual-ring:after {
            content: " ";
            display: block;
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 3px solid #fff;
            border-color: #fff transparent #fff transparent;
            animation: lds-dual-ring 1.2s linear infinite;
        }
        @keyframes lds-dual-ring {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading_text" class="centered">
        <div class="lds-dual-ring"></div>
        <p>Loading…</p>
    </div>
    <canvas id="the_canvas_id"></canvas>
    <noscript>You need JavaScript to use this application.</noscript>
</body>
</html>
